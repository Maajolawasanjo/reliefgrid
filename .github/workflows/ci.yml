name: ReliefGrid CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Pytest & Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx pydantic sqlmodel psycopg2-binary pgvector boto3 slowapi tenacity
      - name: Run Ruff Linter
        run: ruff check apps/api
      - name: Run Pytest Integration Suite
        run: pytest tests/integration/test_api_flow.py -v

  frontend-test:
    name: Frontend Type-Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install NPM Dependencies
        run: |
          cd apps/web
          npm ci
      - name: Type-Check TypeScript
        run: |
          cd apps/web
          npx tsc --noEmit
