# Target Python version
target-version = "py311"

# Line length matching team standard
line-length = 120

[lint]
# Enable Pyflakes (F), pycodestyle (E, W), isort (I), and Naming (N)
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["B008", "E501"]

# Allow fix for all enabled rules
fixable = ["ALL"]
unfixable = []

[lint.isort]
combine-as-imports = true
known-first-party = ["app"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
